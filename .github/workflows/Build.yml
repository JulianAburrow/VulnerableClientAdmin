name: Build and Test VulnerableClientAdmin

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build UI, DataAccess and Test projects
        run: |
          dotnet build VulnerableClientAdminUI/VulnerableClientAdminUI.csproj --no-restore --configuration Release
          dotnet build VulnerableClientAdminDataAccess/VulnerableClientAdminDataAccess.csproj --no-restore --configuration Release
          dotnet build VulnerableClientAdminTests/VulnerableClientAdminTests.csproj --no-restore --configuration Release

      - name: Run tests
        run: dotnet test VulnerableClientAdminTests/VulnerableClientAdminTests.csproj --no-build --configuration Release --verbosity normal